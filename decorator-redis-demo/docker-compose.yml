services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    hostname: postgres
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-pwd
      POSTGRES_DB: "decorator_redis_demo"
    secrets:
      - postgres-pwd
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: decorator-redis-demo/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

secrets:
  postgres-pwd:
    file: ./secrets/postgres-pwd.txt